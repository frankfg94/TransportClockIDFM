name: Publish Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      approve_oversize:
        description: Publish an APK larger than 25 Mio (exceptional)
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      NUXT_PUBLIC_API_BASE_URL: ${{ vars.NUXT_PUBLIC_API_BASE_URL }}
      MOBILE_RELEASE_VERSION_CODE: ${{ github.run_number }}
      MOBILE_RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/transport-clock-release.jks
      MOBILE_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.MOBILE_RELEASE_KEYSTORE_PASSWORD }}
      MOBILE_RELEASE_KEY_ALIAS: ${{ secrets.MOBILE_RELEASE_KEY_ALIAS }}
      MOBILE_RELEASE_KEY_PASSWORD: ${{ secrets.MOBILE_RELEASE_KEY_PASSWORD }}
      ANDROID_SIGNING_CERT_SHA256: ${{ secrets.ANDROID_SIGNING_CERT_SHA256 }}
      MOBILE_RELEASE_R2_ENDPOINT: ${{ vars.MOBILE_RELEASE_R2_ENDPOINT }}
      MOBILE_RELEASE_R2_BUCKET: ${{ vars.MOBILE_RELEASE_R2_BUCKET }}
      MOBILE_RELEASE_R2_ACCESS_KEY_ID: ${{ secrets.MOBILE_RELEASE_R2_ACCESS_KEY_ID }}
      MOBILE_RELEASE_R2_SECRET_ACCESS_KEY: ${{ secrets.MOBILE_RELEASE_R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install dependencies
        run: npm ci
      - name: Restore signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$MOBILE_RELEASE_KEYSTORE_PATH"
      - name: Build and validate signed APK
        run: |
          if [ "${{ inputs.approve_oversize }}" = "true" ]; then
            npm run apk:build -- --approve-oversize
          else
            npm run apk:build
          fi
      - name: Publish APK and manifest to R2
        run: |
          if [ "${{ inputs.approve_oversize }}" = "true" ]; then
            npm run apk:publish -- --approve-oversize
          else
            npm run apk:publish
          fi
      - name: Keep build artifact for 14 days
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: dist/mobile-release/
          retention-days: 14
